<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>報到掃描</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#2d5a3d;--moss:#4a7c59;--sage:#7aab87;
  --mist:#c8ddc2;--cream:#f5f2eb;--paper:#faf8f3;
  --ink:#2a2620;--stone:#8a8478;
  --ok-bg:#edf7ee;--ok-bd:#a8d5a2;--ok-tx:#1f4d2c;
  --dup-bg:#fef6e4;--dup-bd:#e8c87a;--dup-tx:#7a4f0f;
  --err-bg:#fdf0f0;--err-bd:#d4a0a0;--err-tx:#7a2020;
}
html,body{height:100%;background:var(--cream);font-family:'Noto Sans TC',sans-serif;color:var(--ink);overscroll-behavior:none}
body{display:flex;flex-direction:column;min-height:100dvh}

/* Header */
.hd{background:var(--green);padding:18px 20px 14px;flex-shrink:0;position:relative;overflow:hidden}
.hd::before{content:'';position:absolute;top:-24px;right:-16px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.07)}
.hd-inner{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start}
.hd-label{font-size:10px;letter-spacing:.18em;color:var(--mist);margin-bottom:4px}
.hd-event{font-size:17px;font-weight:700;color:#fff;line-height:1.3}
.hd-sub{font-size:11px;color:rgba(200,221,194,.65);margin-top:3px}
.badge{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:7px 12px;text-align:center;min-width:52px}
.badge-num{font-size:22px;font-weight:900;color:#fff;line-height:1}
.badge-lbl{font-size:9px;color:var(--mist);letter-spacing:.08em;margin-top:1px}

/* Tabs */
.tabs{display:flex;background:var(--paper);border-bottom:1px solid rgba(45,90,61,.1);flex-shrink:0}
.tab{flex:1;padding:10px 4px;border:none;background:none;font-family:'Noto Sans TC',sans-serif;font-size:11px;font-weight:500;color:var(--stone);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab.on{color:var(--green);border-bottom-color:var(--green)}

/* Content */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pane{display:none;padding:16px}
.pane.on{display:block}

/* Scanner */
.scan-card{background:var(--paper);border:1px solid rgba(45,90,61,.1);border-radius:14px;overflow:hidden;margin-bottom:14px}
.scan-wrap{position:relative;background:#101e14;aspect-ratio:1}
#qr{width:100%!important}
#qr video{width:100%!important;height:100%!important;object-fit:cover}
#qr img{display:none!important}
#qr *{border:none!important}
.overlay{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.frame{width:52%;aspect-ratio:1;position:relative}
.frame::before,.frame::after,.frame b::before,.frame b::after{content:'';position:absolute;width:18px;height:18px;border-color:var(--sage);border-style:solid}
.frame::before{top:0;left:0;border-width:2px 0 0 2px;border-radius:2px 0 0 0}
.frame::after{top:0;right:0;border-width:2px 2px 0 0;border-radius:0 2px 0 0}
.frame b::before{bottom:0;left:0;border-width:0 0 2px 2px;border-radius:0 0 0 2px}
.frame b::after{bottom:0;right:0;border-width:0 2px 2px 0;border-radius:0 0 2px 0}
.scanline{position:absolute;left:3px;right:3px;top:3px;height:1.5px;background:linear-gradient(90deg,transparent,var(--sage),transparent);animation:sl 2s ease-in-out infinite}
@keyframes sl{0%{top:3px;opacity:0}8%{opacity:.9}92%{opacity:.9}100%{top:calc(100% - 3px);opacity:0}}
.scan-hint{padding:10px;font-size:12px;color:var(--stone);text-align:center}

/* Manual input */
.input-row{display:flex;gap:8px;margin-bottom:14px}
.ci{flex:1;background:var(--paper);border:1px solid rgba(45,90,61,.18);border-radius:10px;padding:11px 14px;font-family:'Noto Sans TC',sans-serif;font-size:18px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);outline:none;min-width:0;transition:border-color .15s}
.ci:focus{border-color:var(--moss)}
.ci::placeholder{font-size:13px;letter-spacing:0;color:var(--stone)}
.go{background:var(--green);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0}
.go:active{background:var(--moss)}

/* Result */
.result{border-radius:12px;padding:16px 18px;margin-bottom:14px;display:none;animation:up .2s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result.show{display:block}
.result.ok{background:var(--ok-bg);border:1px solid var(--ok-bd)}
.result.dup{background:var(--dup-bg);border:1px solid var(--dup-bd)}
.result.err{background:var(--err-bg);border:1px solid var(--err-bd)}
.r-tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.result.ok  .r-tag{color:var(--ok-tx)}
.result.dup .r-tag{color:var(--dup-tx)}
.result.err .r-tag{color:var(--err-tx)}
.r-name{font-size:28px;font-weight:900;line-height:1.15;margin-bottom:3px}
.result.ok  .r-name{color:var(--ok-tx)}
.result.dup .r-name{color:var(--dup-tx)}
.result.err .r-name{color:var(--err-tx)}
.r-meta{font-size:12px;color:var(--stone);display:flex;gap:12px;margin-top:5px;flex-wrap:wrap}

/* List */
.flock-hd{display:flex;align-items:center;justify-content:space-between;background:var(--green);border-radius:9px;padding:7px 12px;margin-bottom:5px}
.flock-nm{font-size:12px;font-weight:700;color:#fff}
.flock-ct{font-size:11px;color:var(--mist)}
.mb{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--paper);border:1px solid rgba(45,90,61,.07);border-radius:7px;margin-bottom:3px}
.mb.ck{background:#edf7ee;border-color:rgba(74,124,89,.18)}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
.mb.ck .dot{background:var(--moss)}
.mn{font-size:13px;font-weight:500;flex:1}
.mb.ck .mn{color:var(--green)}
.mt{font-size:10px;color:var(--stone)}

/* Stats */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:var(--paper);border:1px solid rgba(45,90,61,.09);border-radius:11px;padding:13px;text-align:center}
.sn{font-size:30px;font-weight:900;color:var(--green);line-height:1}
.sl{font-size:11px;color:var(--stone);margin-top:3px}
.sr{font-size:12px;font-weight:700;color:var(--moss);margin-top:2px}
.fi{background:var(--paper);border:1px solid rgba(45,90,61,.07);border-radius:9px;padding:10px 13px;margin-bottom:7px}
.fih{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.fin{font-size:12px;font-weight:700;color:var(--green)}
.fip{font-size:12px;font-weight:700;color:var(--moss)}
.pb{background:#ddecd5;border-radius:999px;height:5px;overflow:hidden}
.pf{background:var(--moss);height:100%;border-radius:999px;transition:width .4s}

/* Manual */
.sw{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid rgba(45,90,61,.14);border-radius:9px;padding:9px 13px;margin-bottom:11px}
.si{flex:1;border:none;background:none;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink);outline:none}
.si::placeholder{color:var(--stone)}
.mi{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--paper);border:1px solid rgba(45,90,61,.07);border-radius:9px;margin-bottom:5px}
.mi.ck{background:#edf7ee;border-color:rgba(74,124,89,.2)}
.ml{display:flex;flex-direction:column;gap:1px}
.mln{font-size:14px;font-weight:500}
.mi.ck .mln{color:var(--green)}
.mls{font-size:11px;color:var(--stone)}
.cb{background:var(--paper);border:1px solid rgba(45,90,61,.18);border-radius:7px;padding:5px 13px;font-family:'Noto Sans TC',sans-serif;font-size:12px;font-weight:700;color:var(--green);cursor:pointer;flex-shrink:0}
.mi.ck .cb{background:var(--green);color:#fff;border-color:var(--green)}

/* Loading / Toast */
.ld{display:none;position:fixed;inset:0;background:rgba(30,26,20,.6);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.ld.on{display:flex}
.sp{width:28px;height:28px;border:2px solid rgba(255,255,255,.18);border-top-color:var(--mist);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-t{font-size:12px;color:var(--mist)}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 18px);left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;border-radius:999px;padding:8px 18px;font-size:12px;white-space:nowrap;opacity:0;transition:all .22s;z-index:200;pointer-events:none}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-inner">
    <div>
      <div class="hd-label">CYP135 票務系統</div>
      <div class="hd-event" id="ev-name">載入中...</div>
      <div class="hd-sub" id="ev-sub"></div>
    </div>
    <div class="badge">
      <div class="badge-num" id="ct">0</div>
      <div class="badge-lbl">已報到</div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab on"  onclick="go('scan')">掃描</button>
  <button class="tab"     onclick="go('list')">名單</button>
  <button class="tab"     onclick="go('stats')">統計</button>
  <button class="tab"     onclick="go('manual')">手動</button>
</div>

<div class="body">

  <div class="pane on" id="pane-scan">
    <div class="scan-card">
      <div class="scan-wrap">
        <div id="qr"></div>
        <div class="overlay"><div class="frame"><b></b><div class="scanline"></div></div></div>
      </div>
      <div class="scan-hint">對準學員票券上的 QR Code</div>
    </div>
    <div class="result" id="result">
      <div class="r-tag" id="r-tag"></div>
      <div class="r-name" id="r-name"></div>
      <div class="r-meta" id="r-meta"></div>
    </div>
    <div class="input-row">
      <input class="ci" id="ci" maxlength="6" placeholder="掃不到？輸入票券上的 6 碼" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="go" onclick="submit(document.getElementById('ci').value)">確認</button>
    </div>
  </div>

  <div class="pane" id="pane-list">
    <div id="list-body"><div style="text-align:center;padding:40px;font-size:13px;color:var(--stone)">載入中...</div></div>
  </div>

  <div class="pane" id="pane-stats">
    <div class="sg">
      <div class="sc"><div class="sn" id="s-tot">0</div><div class="sl">總報名</div></div>
      <div class="sc"><div class="sn" id="s-ck">0</div><div class="sl">已報到</div><div class="sr" id="s-rt">0%</div></div>
    </div>
    <div id="flock-stats"></div>
  </div>

  <div class="pane" id="pane-manual">
    <div class="sw">
      <span style="color:var(--stone);font-size:14px">⌕</span>
      <input class="si" id="si" placeholder="搜尋姓名或小組..." oninput="filterM(this.value)">
    </div>
    <div id="manual-body"><div style="text-align:center;padding:40px;font-size:13px;color:var(--stone)">載入中...</div></div>
  </div>

</div>

<div class="ld" id="ld"><div class="sp"></div><div class="ld-t" id="ld-t">驗證中...</div></div>
<div class="toast" id="toast"></div>

<script>
// ══ 設定 ══════════════════════════════════════════════
const GAS  = 'https://script.google.com/macros/s/AKfycbzlEBM9PCjfGW-QC3w0ILIaQ9-yjvPPLnLxzT_5QD-zjsjSbnpEQcgDg6uyNvjd1vIt/exec';
const LIFF = '2009773305-tsZtDMOz';

let members=[], checked=0, token='', cool=false, scanner=null;

// ══ 初始化 ═════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('ci').addEventListener('keydown', e => { if(e.key==='Enter') submit(e.target.value); });

  // LIFF 初始化並取得 UID
  var _userId = '';
  try {
    await liff.init({ liffId: LIFF });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    _userId = profile.userId;
  } catch(e) {
    _userId = '';
  }

  // debug：顯示取到的 UID
  document.getElementById('ev-sub').textContent = 'UID: ' + _userId;

  // UID 取得失敗就擋住
  if (!_userId) {
    document.querySelector('.tabs').style.display = 'none';
    document.querySelector('.body').innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:40px;text-align:center;gap:16px">' +
      '<div style="font-size:48px">🌿</div>' +
      '<div style="font-size:18px;font-weight:700;color:var(--green)">無法取得身分</div>' +
      '<div style="font-size:13px;color:var(--stone);line-height:1.8">請在 LINE 內開啟此頁面</div>' +
      '</div>';
    return;
  }

  // 讀活動資訊
  try {
    const r = await fetch(GAS + '?action=getActiveEvent');
    const d = await r.json();
    if (d.status === 'ok') {
      document.getElementById('ev-name').textContent = d.eventName || '活動';
      const sub = [d.session, d.ticketType].filter(Boolean).join(' · ');
      document.getElementById('ev-sub').textContent  = sub + (d.dateStr ? '　' + d.dateStr : '');
    } else {
      document.getElementById('ev-name').textContent = '目前沒有開放活動';
    }
  } catch(e) { document.getElementById('ev-name').textContent = '載入失敗，請重試'; }

  // ── 驗證掃碼權限（嚴格模式）──
  var allowed = false;
  try {
    const permRes = await fetch(GAS + '?action=checkPermission&userId=' + encodeURIComponent(_userId));
    const permData = await permRes.json();
    allowed = permData.allowed === true;
    console.log('checkPermission result:', permData, 'userId sent:', _userId);
  } catch(e) {
    allowed = false;
    console.log('checkPermission error:', e);
  }

  if (!allowed) {
    document.querySelector('.tabs').style.display = 'none';
    document.querySelector('.body').innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;' +
      'min-height:60vh;padding:40px;text-align:center;gap:16px">' +
      '<div style="font-size:48px">🌿</div>' +
      '<div style="font-size:18px;font-weight:700;color:var(--green)">您沒有掃碼權限</div>' +
      '<div style="font-size:13px;color:var(--stone);line-height:1.8">請聯絡會長開通掃碼權限<br>確認您的 LINE 帳號已在授權名單內</div>' +
      '</div>';
    return;
  }

  // 先載入名單，再啟動相機（讓名單先準備好）
  await loadMembers();
  startScanner();
});

// ══ 掃描器 ═════════════════════════════════════════════
function startScanner() {
  scanner = new Html5Qrcode('qr');
  // 先請求相機權限，讓瀏覽器記住（之後不再詢問）
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(function(stream) {
        stream.getTracks().forEach(function(t) { t.stop(); });
      }).catch(function() {});
  }
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 210, height: 210 }, aspectRatio: 1 },
    code => { if (!cool) { cool=true; submit(code.trim().toUpperCase()); setTimeout(()=>{ cool=false; }, 3000); } },
    () => {}
  ).catch(() => {
    document.querySelector('.scan-wrap').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:180px;color:var(--sage);font-size:13px;text-align:center;padding:20px">無法存取相機<br>請使用下方手動輸入 CODE</div>';
  });
}

// ══ 報到驗證 ═══════════════════════════════════════════
async function submit(code) {
  code = code.trim().toUpperCase();
  if (!code || code.length < 4) { toast('請輸入完整 CODE'); return; }
  loading('驗證中...');
  document.getElementById('ci').value = '';
  try {
    const r = await fetch(GAS + '?action=checkin&code=' + encodeURIComponent(code));
    const d = await r.json();
    showResult(d);
    if (d.status === 'ok') {
      checked++;
      document.getElementById('ct').textContent = checked;
      // 只更新那一筆，不重載整個名單（速度快很多）
      var m = members.find(function(x){ return x.code === code; });
      if (m) { m.checked = true; m.time = d.time || new Date().toLocaleString('zh-TW'); }
      else await loadMembers();
      renderList(); renderStats(); renderManual(members);
    }
  } catch(e) { showResult({ status: 'error', message: '網路錯誤，請重試' }); }
  finally { unload(); }
}

function showResult(d) {
  const el = document.getElementById('result');
  el.className = 'result show';
  if (d.status === 'ok') {
    el.classList.add('ok');
    document.getElementById('r-tag').textContent  = '✓  報到成功';
    document.getElementById('r-name').textContent = d.name;
    document.getElementById('r-meta').innerHTML   = `<span>${d.flock}</span><span>${d.time ? d.time.slice(11,16) : ''}</span>`;
    vib([40,20,40]); beep('ok');
  } else if (d.status === 'duplicate') {
    el.classList.add('dup');
    document.getElementById('r-tag').textContent  = '⚠  已報到過';
    document.getElementById('r-name').textContent = d.name;
    document.getElementById('r-meta').innerHTML   = `<span>${d.flock}</span><span>首次：${d.firstCheckin ? d.firstCheckin.slice(11,16) : ''}</span>`;
    vib([150]); beep('dup');
  } else {
    el.classList.add('err');
    document.getElementById('r-tag').textContent  = '✕  查無報名記錄';
    document.getElementById('r-name').textContent = '請再次掃描';
    document.getElementById('r-meta').innerHTML   = `<span>${d.message||''}</span>`;
    vib([80,40,80]); beep('err');
  }
  setTimeout(() => { el.className = 'result'; }, 4000);
}

// ══ 載入名單 ═══════════════════════════════════════════
async function loadMembers() {
  try {
    const r = await fetch(GAS + '?action=getMembers');
    const d = await r.json();
    members = d.members || [];
    checked = members.filter(m => m.checked).length;
    document.getElementById('ct').textContent = checked;
    renderList(); renderStats(); renderManual(members);
  } catch(e) {}
}

function renderList() {
  const g = {};
  members.forEach(m => { if(!g[m.flock]) g[m.flock]=[]; g[m.flock].push(m); });
  let h = '';
  Object.keys(g).sort().forEach(f => {
    const list=g[f], ck=list.filter(m=>m.checked).length;
    h += `<div style="margin-bottom:14px"><div class="flock-hd"><span class="flock-nm">${f}</span><span class="flock-ct">${ck}/${list.length} 人</span></div>`;
    list.forEach(m => {
      h += `<div class="mb ${m.checked?'ck':''}"><div class="dot"></div><div class="mn">${m.name}</div><div class="mt">${m.time ? formatTime(m.time) : '未報到'}</div></div>`;
    });
    h += '</div>';
  });
  document.getElementById('list-body').innerHTML = h || '<div style="text-align:center;padding:40px;font-size:13px;color:var(--stone)">名單是空的</div>';
}

function renderStats() {
  const tot=members.length, ck=members.filter(m=>m.checked).length;
  const rt=tot ? Math.round(ck/tot*100) : 0;
  document.getElementById('s-tot').textContent = tot;
  document.getElementById('s-ck').textContent  = ck;
  document.getElementById('s-rt').textContent  = rt + '%';
  const g = {};
  members.forEach(m => { if(!g[m.flock]) g[m.flock]={t:0,c:0}; g[m.flock].t++; if(m.checked) g[m.flock].c++; });
  let h = '';
  Object.keys(g).sort().forEach(f => {
    const {t,c} = g[f], p = t ? Math.round(c/t*100) : 0;
    h += `<div class="fi"><div class="fih"><span class="fin">${f}</span><span class="fip">${c}/${t} 人　${p}%</span></div><div class="pb"><div class="pf" style="width:${p}%"></div></div></div>`;
  });
  document.getElementById('flock-stats').innerHTML = h;
}

function renderManual(list) {
  document.getElementById('manual-body').innerHTML = list.length
    ? list.map((m,i) => `<div class="mi ${m.checked?'ck':''}" id="mi${i}"><div class="ml"><div class="mln">${m.name}</div><div class="mls">${m.flock} · ${m.code}</div></div><button class="cb" onclick="manualCk(${i})">${m.checked?'已報到':'報到'}</button></div>`).join('')
    : '<div style="text-align:center;padding:40px;font-size:13px;color:var(--stone)">無符合結果</div>';
}

function formatTime(t) {
  if (!t) return '未報到';
  try {
    var d = new Date(t);
    if (isNaN(d.getTime())) {
      // 格式 yyyy/MM/dd HH:mm:ss
      var parts = t.split(' ');
      if (parts.length >= 2) return parts[0].slice(5) + ' ' + parts[1].slice(0,5);
      return t.slice(0,16);
    }
    var M = d.getMonth()+1;
    var D = d.getDate();
    var h = d.getHours();
    var m = d.getMinutes();
    return (M<10?'0'+M:M) + '/' + (D<10?'0'+D:D) + ' ' + (h<10?'0'+h:h) + ':' + (m<10?'0'+m:m);
  } catch(e) { return t.slice(0,16); }
}

function filterM(q) {
  renderManual(members.filter(m => m.name.includes(q)||m.flock.includes(q)||m.code.includes(q.toUpperCase())));
}

async function manualCk(i) {
  const m = members[i];
  if (m.checked) { toast(m.name + ' 已報到'); return; }
  loading('報到中...');
  try {
    const r = await fetch(GAS + '?action=checkin&code=' + encodeURIComponent(m.code));
    const d = await r.json();
    if (d.status==='ok') { toast(m.name + ' 報到完成'); checked++; document.getElementById('ct').textContent=checked; await loadMembers(); }
    else toast(d.message || '操作失敗');
  } catch(e) { toast('網路錯誤'); } finally { unload(); }
}

// ══ UI 工具 ════════════════════════════════════════════
function go(tab) {
  const tabs = ['scan','list','stats','manual'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('on', tabs[i]===tab));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  document.getElementById('pane-'+tab).classList.add('on');
}
function loading(t) { document.getElementById('ld-t').textContent=t||'處理中...'; document.getElementById('ld').classList.add('on'); }
function unload() { document.getElementById('ld').classList.remove('on'); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200); }
function vib(p) { if(navigator.vibrate) navigator.vibrate(p); }

function beep(type) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (type === 'ok') {
      // 成功：兩聲短促高音
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.15);
      var o2 = ctx.createOscillator();
      var g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.value = 1100;
      g2.gain.setValueAtTime(0.3, ctx.currentTime + 0.18);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      o2.start(ctx.currentTime + 0.18);
      o2.stop(ctx.currentTime + 0.35);
    } else if (type === 'dup') {
      // 重複：一聲中音
      o.frequency.value = 660;
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.3);
    } else {
      // 失敗：一聲低沉長音
      o.frequency.value = 220;
      o.type = 'sawtooth';
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.4);
    }
  } catch(e) {}
}
